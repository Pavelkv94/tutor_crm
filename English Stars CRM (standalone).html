document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:28px;border-radius:8px;border:none;background:rgba(0,0,0,.06);color:#7a1f1f;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;\" style-hover=\"background:rgba(0,0,0,.13);\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"3 6 5 6 21 6\"><\u002Fpolyline><path d=\"M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6\"><\u002Fpath><path d=\"M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n                  <\u002Fdiv>\n                  <div style=\"flex:1;font-size:15px;font-weight:700;color:#2a2415;line-height:1.35;margin-top:6px;\">{{ tk.title }}<\u002Fdiv>\n                  <div style=\"font-size:12px;color:rgba(42,36,21,.6);font-weight:600;margin-top:14px;\">{{ tk.date }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fsection>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fmain>\n\n  <!-- ===== MODAL ===== -->\n  <sc-if value=\"{{ modal }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeModal }}\" style=\"position:fixed;inset:0;background:rgba(20,16,40,.55);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;animation:dcfade .15s ease;\">\n      <div onclick=\"{{ stop }}\" style=\"background:var(--surface);border-radius:18px;width:450px;max-width:100%;padding:26px;box-shadow:0 24px 60px rgba(20,16,40,.35);animation:dcpop .2s ease;\">\n        <div style=\"display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;\">\n          <div><h2 style=\"margin:0;font-size:20px;font-weight:800;color:var(--text);\">Создать ученика<\u002Fh2><p style=\"margin:5px 0 0;font-size:13.5px;color:var(--text-2);\">Добавить нового ученика в систему.<\u002Fp><\u002Fdiv>\n          <button onclick=\"{{ closeModal }}\" styl ,box-shadow .15s;\" style-focus=\"border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);\"><\u002Fdiv>\n        <div style=\"margin-bottom:14px;\"><label style=\"font-size:13px;font-weight:700;color:var(--text);display:block;margin-bottom:6px;\">Преподаватель<\u002Flabel><select style=\"appearance:none;-webkit-appearance:none;width:100%;padding:11px 36px 11px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;color:var(--text);background:var(--surface);cursor:pointer;background-image:url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2214%22 height=%2214%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%234b2eaa%22 stroke-width=%222.5%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22%3E%3Cpolyline points=%226 9 12 15 18 9%22/%3E%3C/svg%3E');background-repeat:no-repeat;background-position:right 12px center;\"><option>Выберите преподавателя<\u002Foption><option>Анна Минтель<\u002Foption><option>Анна Демух<\u002Foption><\u002Fselect><\u002Fdiv>\n        <div style=\"margin-bottom:22px;\"><label style=\"font-size:13px;font-weight:700;color:var(--text);display:block;margin-bottom:6px;\">Регион<\u002Flabel><select style=\"appearance:none;-webkit-appearance:none;width:100%;padding:11px 36px 11px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;color:var(--text);background:var(--surface);cursor:pointer;background-image:url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2214%22 height=%2214%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%234b2eaa%22 stroke-width=%222.5%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22%3E%3Cpolyline points=%226 9 12 15 18 9%22/%3E%3C/svg%3E');background-repeat:no-repeat;background-position:right 12px center;\"><option>Не выбрано<\u002Foption><option>Беларусь<\u002Foption><option>Польша<\u002Foption><option>Казахстан<\u002Foption><\u002Fselect><\u002Fdiv>\n        <div style=\"display:flex;justify-content:flex-end;gap:10px;\">\n          <button onclick=\"{{ closeModal }}\" style=\"background:var(--surface);color:var(--text);border:1.5px solid var(--border);border-radius:10px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;\" style-hover=\"background:var(--surface-2);\">Отмена<\u002Fbutton>\n          <button onclick=\"{{ closeModal }}\" style=\"background:var(--primary-bg);color:var(--primary-fg);border:none;border-radius:10px;padding:10px 22px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 1px 2px rgba(20,16,40,.1);\" style-hover=\"background:var(--primary-bg-hover);\">Создать<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:900},&quot;variant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;restrained&quot;,&quot;bright&quot;],&quot;default&quot;:&quot;restrained&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Оформление&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    variant: (this.props && this.props.variant) || 'restrained',\n    screen: 'home',\n    studentsTeacher: null,\n    tasksTeacher: null,\n    modal: false\n  };\n\n  themes = {\n    restrained: {\n      '--page-bg':'#f6f6fb','--surface':'#ffffff','--surface-2':'#f7f7fc','--border':'#e8e8f1',\n      '--text':'#1b1633','--text-2':'#5b5872','--text-3':'#8e8ba2',\n      '--accent':'#4b2eaa','--accent-2':'#421ca8','--accent-soft':'#efeafc',\n      '--sidebar-bg':'linear-gradient(180deg,#4b2eaa 0%,#3a1c86 100%)',\n      '--sidebar-fg':'rgba(255,255,255,0.96)','--sidebar-fg-muted':'rgba(255,255,255,0.66)',\n      '--sidebar-active-bg':'rgba(255,255,255,0.14)','--sidebar-active-fg':'#ffffff','--sidebar-active-icon':'#f9da00','--sidebar-indicator':'#f9da00',\n      '--primary-bg':'#4b2eaa','--primary-bg-hover':'#3a1c86','--p
