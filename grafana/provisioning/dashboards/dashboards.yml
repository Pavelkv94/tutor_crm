apiVersion: 1

# Провайдер дашбордов: Grafana подхватывает все *.json из указанной папки.
providers:
  - name: 'tutor-dashboards'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
