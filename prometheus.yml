global:
    scrape_interval: 5s

scrape_configs:

  - job_name: 'tutor_backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['tutor_backend:5000']

  - job_name: 'tutor_postgres_exporter'
    static_configs:
      - targets: ['tutor_postgres_exporter:9187']

  - job_name: 'tutor_node_exporter'
    static_configs:
      - targets: ['tutor_node_exporter:9100']

  - job_name: 'tutor_prometheus'
    static_configs:
      - targets: ['tutor_prometheus:9090']


